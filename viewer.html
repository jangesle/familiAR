<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Viewer — FamiliAR</title>
  <link rel="stylesheet" href="css/style.css">

  <!--
    luma-web: Luma AI's Three.js renderer — supports .luma files and Luma CDN URLs.
    esm.sh resolves luma-web's "three" peer-dep through the importmap,
    ensuring both share the same Three.js instance (required for XR to work).
  -->
  <script type="importmap">
  {
    "imports": {
      "three":          "https://esm.sh/three@0.168.0",
      "three/addons/":  "https://esm.sh/three@0.168.0/examples/jsm/",
      "luma-web":       "https://esm.sh/luma-web?deps=three@0.168.0"
    }
  }
  </script>
</head>
<body class="viewer-page">

  <div id="loading-overlay">
    <div class="spinner"></div>
    <span id="load-label">Loading scene…</span>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <span id="load-pct"></span>
  </div>

  <div id="error-msg" style="display:none">
    <h2>Could not load scene</h2>
    <p id="error-detail"></p>
    <a href="index.html">← Back to gallery</a>
  </div>

  <div id="viewer-container"></div>

  <a id="back-btn" href="index.html">← Gallery</a>
  <div id="scene-title"></div>
  <div id="xr-buttons"></div>

  <script type="module">
    import * as THREE               from 'three';
    import { LumaSplatsThree }      from 'luma-web';
    import { VRButton }             from 'three/addons/webxr/VRButton.js';
    import { ARButton }             from 'three/addons/webxr/ARButton.js';
    import { OrbitControls }        from 'three/addons/controls/OrbitControls.js';

    // ── helpers ──────────────────────────────────────────────────────────
    const overlay   = document.getElementById('loading-overlay');
    const xrDiv     = document.getElementById('xr-buttons');

    function showError(msg) {
      overlay.classList.add('hidden');
      document.getElementById('error-detail').textContent = msg;
      document.getElementById('error-msg').style.display = 'flex';
    }

    function hideLoading() {
      overlay.classList.add('hidden');
    }

    // ── 1. Resolve scene from URL param ───────────────────────────────────
    const sceneId = new URLSearchParams(location.search).get('id');
    if (!sceneId) { showError('No ?id= in URL.'); throw 0; }

    let sceneData;
    try {
      const manifest = await fetch('scenes.json').then(r => {
        if (!r.ok) throw new Error(`scenes.json → HTTP ${r.status}`);
        return r.json();
      });
      sceneData = manifest.scenes.find(s => s.id === sceneId);
      if (!sceneData) throw new Error(`Scene "${sceneId}" not found in scenes.json`);
      if (manifest.title) document.title = `${sceneData.title} — ${manifest.title}`;
    } catch (e) { showError(e.message); throw e; }

    document.getElementById('scene-title').textContent = sceneData.title;

    // ── 2. Three.js scene ─────────────────────────────────────────────────
    const threeScene = new THREE.Scene();
    threeScene.background = new THREE.Color(0x0a0a0f);

    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.01, 1000);
    const camPos = sceneData.cameraPosition || [0, 0, 4];
    const camLook = sceneData.cameraLookAt  || [0, 0, 0];
    camera.position.set(...camPos);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.xr.enabled = true;
    document.getElementById('viewer-container').appendChild(renderer.domElement);

    // ── 3. Orbit controls (desktop / non-XR) ─────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(...camLook);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.update();

    renderer.xr.addEventListener('sessionstart', () => { controls.enabled = false; });
    renderer.xr.addEventListener('sessionend',   () => { controls.enabled = true; });

    // ── 4. Luma splat ─────────────────────────────────────────────────────
    //
    // source can be:
    //   - a Luma CDN URL:  "https://lumalabs.ai/capture/uuid-here"
    //   - a local path:    "assets/scenes/my-scene.luma"
    //     (resolved to an absolute URL so luma-web can fetch it)
    //
    const rawSource = sceneData.source;
    if (!rawSource) { showError('"source" is missing in scenes.json for this scene.'); throw 0; }

    const source = rawSource.startsWith('http')
      ? rawSource
      : new URL(rawSource, location.href).href;

    const splat = new LumaSplatsThree({ source });
    threeScene.add(splat);

    // ── 5. Render loop ────────────────────────────────────────────────────
    // Hide loading after the first rendered frames — luma-web streams
    // progressively so the scene will appear quickly even on large files.
    let frameCount = 0;
    renderer.setAnimationLoop(() => {
      controls.update();
      renderer.render(threeScene, camera);
      if (++frameCount === 5) hideLoading();
    });

    // ── 6. Resize ─────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // ── 7. XR buttons ─────────────────────────────────────────────────────
    if ('xr' in navigator) {
      const [vrOk, arOk] = await Promise.all([
        navigator.xr.isSessionSupported('immersive-vr').catch(() => false),
        navigator.xr.isSessionSupported('immersive-ar').catch(() => false),
      ]);

      if (vrOk) {
        const btn = VRButton.createButton(renderer);
        btn.className = 'xr-btn';
        xrDiv.appendChild(btn);
      }

      if (arOk) {
        const btn = ARButton.createButton(renderer, {
          optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking', 'layers'],
        });
        btn.className = 'xr-btn';
        xrDiv.appendChild(btn);
      }

      if (!vrOk && !arOk) {
        const info = document.createElement('span');
        info.style.cssText = 'color:#7070a0;font-size:0.8rem;padding:0.5rem 1rem';
        info.textContent = 'WebXR not supported in this browser';
        xrDiv.appendChild(info);
      }
    }
  </script>
</body>
</html>
